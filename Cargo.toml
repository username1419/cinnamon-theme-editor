[package]
name = "cinnamon-theme-editor"
version = "0.1.0"
edition = "2024"

[dependencies]
log = "0.4.28"
simple_logger = "5.1.0"
regex = "1.12.2"
once_cell = "1.21.3"
dioxus = { version = "0.7.2", features = ["desktop"] }
dioxus-desktop = "0.7.2"
tokio = { version = "1.47.2", features = ["time"] }

[features]
default = ["desktop"]
desktop = ["dioxus/desktop"]
