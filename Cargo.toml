[package]
name = "cinnamon-desktop-editor"
version = "0.1.0"
edition = "2024"

[dependencies]
log = "0.4.28"
simple_logger = "5.1.0"
regex = "1.12.2"
once_cell = "1.21.3"
dioxus = { version = "0.7.1", features = [] }
dioxus-desktop = "0.7.2"

[features]
default = ["desktop"]

# NOTE: below features wont be used, however excluding them makes rust-analyzer crash so 
web = ["dioxus/web"]
desktop = ["dioxus/desktop"]
mobile = ["dioxus/mobile"]
